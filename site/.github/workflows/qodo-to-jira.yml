name: Qodo → Jira Automation

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  qodo-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Qodo Analysis
        id: qodo
        uses: qodo-ai/qodo-action@v1
        with:
          qodo_api_key: ${{ secrets.QODO_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  create-jira-ticket:
    needs: qodo-analysis
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, 'Qodo') && 
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'workflow_dispatch' && needs.qodo-analysis.result == 'failure')

    steps:
      - name: Create Jira Ticket
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [ -z "$COMMENT" ]; then
            COMMENT="Qodo detected issues - check workflow run for details"
          fi

          COMMENT=$(echo "$COMMENT" | jq -Rs .)

          curl -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": {\"key\": \"TQ\"},
                \"summary\": \"Qodo Issue Detected\",
                \"description\": $COMMENT,
                \"issuetype\": {\"name\": \"Task\"}
              }
            }" \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue