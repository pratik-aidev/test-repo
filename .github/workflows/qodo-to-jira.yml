name: Qodo → Jira Automation

permissions:
  contents: read
  pull-requests: read

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  code-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Code Analysis
        id: analysis
        run: |
          echo "🔍 Running code quality analysis..."
          
          # Check for common code issues
          ISSUES_FOUND=0
          
          # Check for missing lowercase conversion in slugs
          if grep -r "function slugify" site/src/lib/slugs.ts | grep -q "."; then
            if ! grep -A 6 "function slugify" site/src/lib/slugs.ts | grep -q "toLowerCase"; then
              echo "❌ Issue: slugify function missing toLowerCase()"
              ISSUES_FOUND=$((ISSUES_FOUND + 1))
            fi
          fi
          
          # Check for incorrect sort order
          if grep -q "leftTime - rightTime" site/src/lib/content.ts; then
            echo "❌ Issue: Sort order appears reversed in sortByPublishedAt"
            ISSUES_FOUND=$((ISSUES_FOUND + 1))
          fi
          
          # Check for missing slash in blog route
          if grep -q "/blog\${normalizeSlug" site/src/lib/routes.ts; then
            echo "❌ Issue: Missing slash separator in blogPath route"
            ISSUES_FOUND=$((ISSUES_FOUND + 1))
          fi
          
          # Check for missing fallback in buildImageUrl
          if grep -A 6 "function buildImageUrl" site/src/lib/seo.ts | grep -q "return buildAbsoluteUrl(image, siteUrl);"; then
            echo "❌ Issue: Missing fallback operator in buildImageUrl"
            ISSUES_FOUND=$((ISSUES_FOUND + 1))
          fi
          
          if [ $ISSUES_FOUND -gt 0 ]; then
            echo "⚠️ Found $ISSUES_FOUND code quality issue(s)"
            exit 1
          else
            echo "✅ No issues found"
            exit 0
          fi
        continue-on-error: true

  create-jira-ticket:
    needs: code-analysis
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, 'Qodo') && 
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'workflow_dispatch' && needs.code-analysis.result == 'failure')

    steps:
      - name: Create Jira Ticket
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [ -z "$COMMENT" ]; then
            COMMENT="Code analysis detected issues - check workflow run for details"
          fi

          COMMENT=$(echo "$COMMENT" | jq -Rs .)

          curl -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": {\"key\": \"TQ\"},
                \"summary\": \"Code Quality Issue Detected\",
                \"description\": $COMMENT,
                \"issuetype\": {\"name\": \"Task\"}
              }
            }" \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue
