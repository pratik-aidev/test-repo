# Qodo Configuration
# 
# IMPORTANT: Sensitive configuration (API keys, URLs, credentials) should be configured
# via environment variables or GitHub secrets, NOT hardcoded in this file.
#
# Required secrets (set in GitHub Settings > Secrets):
#   - QODO_API_KEY: Qodo API authentication key
#   - JIRA_EMAIL: Jira account email for API access
#   - JIRA_API_TOKEN: Jira API token for authentication
#   - JIRA_BASE_URL: Base URL of your Jira instance (e.g., https://company.atlassian.net)
#   - GITHUB_TOKEN: GitHub token for authentication (provided by GitHub Actions)

analysis:
  auto_review: true
  suggest_fixes: true
  detect_issues: true

pull_requests:
  auto_comment: true
  review_on_open: true
  review_on_push: true

rules:
  severity_threshold: medium

